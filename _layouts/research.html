---
layout: default
---

<article class="page">

  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  {% for item in page.items %}
  <div class="research-topic">
  <p>
  	<img src="{{ item.image.src | absolute_url }}" class="research-bubble"/>
	<span class="research-text">
		<strong>{{ item.title }}</strong>
		&mdash;
		{{ item.description }}
	</span>
  </p>
  </div>
  {% endfor %}

</article>
